version: "3"
services:
  # MySQL database
  db:
    image: mysql:8.0
    container_name: weather_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: weather_db
      MYSQL_USER: weather_user
      MYSQL_PASSWORD: weather_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # REST API container
  rest-api:
    build: ./src
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: weather_db
      DB_USER: weather_user
      DB_PASS: weather_pass
    ports:
      - "5000:5000"

volumes:
  db_data:
