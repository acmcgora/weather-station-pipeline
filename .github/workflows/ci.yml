name: Weather Station CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        
      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Compile Java
      - name: Compile Java
        run: javac -d out $(find src -name "*.java")

      # Step 4: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 5: Install Node.js dependencies
      - name: Install Node.js dependencies
        working-directory: src/sampler
        run: npm install

      # Step 6: Start Node.js sampler
      - name: Start Node.js sampler
        working-directory: src/sampler
        run: |
          nohup node Node.js &   # 🔥 CHANGE this if your file name is different
          sleep 3

      # Step 7: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 8: Install Python dependencies
      - name: Install Python dependencies
        working-directory: src/transformer
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      # Step 9: Start Flask Transformer
      - name: Start Flask Transformer
        working-directory: src/transformer
        run: |
          nohup python Flaskapp.py &
          sleep 3

      # Step 10: Run Java pipeline (uses services)
      - name: Run Java Weather Station Pipeline
        run: java -cp out Main

      # Step 11: Run Java pipeline (local fallback)
      - name: Run Java Weather Station Pipeline (CI mode)
        run: CI_CYCLES=5 java -cp out Main

      # Step 12: Run Node.js unit tests
      - name: Run Sampler unit tests
        working-directory: src/sampler
        run: npx jest

      # Step 13: Run Python Transformer unit tests
      - name: Run Transformer unit tests
        working-directory: tests
        run: pytest
