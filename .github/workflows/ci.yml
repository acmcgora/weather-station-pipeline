name: Java Weather Station CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile
      run: javac -d out $(find src -name "*.java")

    - name: Run Pipeline (10 seconds)
      run: timeout 10s java -cp out Main
