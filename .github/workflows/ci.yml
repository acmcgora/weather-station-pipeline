name: Weather Station CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        
      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Compile Java
      - name: Compile Java
        run: javac -d out $(find src -name "*.java")

      # Step 4: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 5: Install Node.js dependencies
      - name: Install Node.js dependencies
        working-directory: src/sampler
        run: npm install

      # Step 6: Start Node.js sampler in background
      - name: Start Node.js sampler
        working-directory: src/sampler
        run: |
          nohup npx jest &  # if you have tests
          nohup node index.js &  # replace with your sampler entrypoint
          sleep 3  # wait for server to start

      # Step 7: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 8: Install Python dependencies
      - name: Install Python dependencies
        working-directory: src/transformer
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      # Step 9: Start Flask Transformer in background
      - name: Start Flask Transformer
        working-directory: src/transformer
        run: |
          nohup python transformer_app.py &  # replace with your Flask entrypoint
          sleep 3  # wait for server to start

      # Step 10: Run Java pipeline
      - name: Run Java Weather Station Pipeline
        run: CI_CYCLES=5 java -cp out Main

      # Step 11: Run Node.js unit tests
      - name: Run Sampler unit tests
        working-directory: src/sampler
        run: npx jest

      # Step 12: Run Python Transformer unit tests
      - name: Run Transformer unit tests
        working-directory: tests
        run: pytest
