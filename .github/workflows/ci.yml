name: Weather Station CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Java pipeline setup 
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile Java
        run: javac -d out $(find src -name "*.java")

      #  Python/Flask setup 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: src/transformer
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      # Step 3: Start Flask Transformer in background
      - name: Start Flask Transformer
        working-directory: src/transformer
        run: |
          nohup python Flaskapp.py &

      # Run Java Pipeline 
      - name: Run Java Weather Station Pipeline
        run: CI_CYCLES=15 java -cp out Main

      #  Python Unit Tests 
      - name: Run Transformer unit tests
        working-directory: tests
        run: pytest -v transformer.test.py

      #  Node.js Sampler setup 
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Node.js dependencies
        working-directory: src/sampler
        run: npm install

      - name: Run Sampler unit tests
        working-directory: src/sampler
        run: npx jest
