name: Weather Station CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        
      # Java pipeline setup
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Compile Java files
      - name: Compile Java
        run: javac -d out $(find src -name "*.java")

      # Node.js Sampler setup
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Node.js dependencies
        working-directory: src/sampler
        run: npm install

      - name: Run Node.js Sampler unit tests
        working-directory: src/sampler
        run: npx jest

      # Python Flask Transformer setup
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: src/transformer
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      # Start Flask Transformer in background
      - name: Start Flask Transformer
        working-directory: src/transformer
        run: |
          nohup python Flaskapp.py &
          sleep 3  # give it time to start

      # Run Java pipeline pointing to Flask service
      - name: Run Java Weather Station Pipeline
        env:
          CI_CYCLES: 5
        run: java -cp out Main

      # Run Transformer Python unit tests
      - name: Run Transformer unit tests
        working-directory: tests
        run: pytest
